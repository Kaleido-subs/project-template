ENABLE_SWAP=True

DELIMITER_REG=*
DELIMITER_S&S=/


# Basic information
group=Kaleido
default.*.tag=${group}-subs
mini.*.tag=${group}-mini

jp_title=Some Show
en_title=
shorthand=${jp_title}


# Codec info to be used in the filename
# These will (eventually) automatically be extracted from the premux file
# Remove "Dual Audio" if it's not a dual audio release
source=BD 1080p

vcodec=HEVC x265 10-bit
mini.*.vcodec=AV1 10-bit
acodec=Opus 2.0

codec_info=${source} ${vcodec} ${acodec}

format=($codec_info) [Dual Audio]
{NC*}.format=(${codec_info})
dirformat=($source) [Dual Audio]


# Specific names for individual subtitle tracks
strack_reg=Full Subtitles [${group}]
strack_hono=Honorifics [${group}]
strack_ss=Signs & Songs [${group}]


# Show-related (output) files
title=[${tag}] ${jp_title} - ${number} - ${format}

number=${episode}${version} (${tvdb})
{SP*}.number=${epabs}${version} (${tvdb})

premux=${episode}/*(Premux)*.mkv
mini.*.premux=${episode}/*(Mini Premux)*.mkv

muxdir=[${tag}] ${jp_title} (${en_title}) - S${batch_season} ${dirformat}
muxout=${muxdir}/$title [$mux.crc].mkv


# Per-episode versioning (in case of v0's or v2's and beyond)
# Make sure to prefix with a "v"
version=


# Episodes, batches, and other basic features
episodes={01..12}|SP{1..2}|NCOP{1..2}|NCED{1..2}
batches=BD|vol{1..6}

vol1.episodes={01..02,SP1,NCOP1,NCED1}
vol2.episodes={03..04}
vol3.episodes={05..06,SP2}
vol4.episodes={07..08}
vol5.episodes={09..10,SP3}
vol6.episodes={10..12,NCOP2,NCED2}

chapters=${dialogue}


# Individual script components
dialogue=${episode}/${shorthand} - ${tvdb} - Dialogue.ass

extra=${episode}/${shorthand} - ${tvdb} - Extra*.ass
forced=${episode}/${shorthand} - ${tvdb} - Forced*.ass

TS=${episode}/${shorthand} - ${tvdb} - TS*.ass
INS=${episode}/${shorthand} - ${tvdb} - INS*.ass

render_warning=common/warning.ass


# Common and episode fonts
common_fonts=common/fonts
episode_fonts=${episode}/fonts


# OP/ED scripts and episode numbers
# Common OP/EDs and their episode numbers
{02..12,SP1}.OP_name=NCOP1
{13..24,SP2}.OP_name=NCOP2
{01..12,SP1}.ED_name=NCED1
{13..24,SP2}.ED_name=NCED2

{02..12,SP1}.OP=${OP_name}/${shorthand} - ${OP_name}*.ass
{02..12,SP2}.OP=${OP_name}/${shorthand} - ${OP_name}*.ass
{13..24,SP1}.ED=${ED_name}/${shorthand} - ${ED_name}*.ass
{13..24,SP2}.ED=${ED_name}/${shorthand} - ${ED_name}*.ass

# Fonts
opfonts=${OP_name}/fonts
edfonts=${ED_name}/fonts


# Creditless OPs and EDs
{NC*}.ENABLE_SWAP=False

{NC*}.number=${episode}${version}
{NC*}.dialogue=${episode}/${shorthand} - ${tvdb} - Lyrics.ass

{NC*}.OP=
{NC*}.ED=

{NC*}.muxout=${muxdir}/Extras/${title} [${mux.crc}].mkv


# Torrent stuff
trackers=http://nyaa.tracker.wf:7777/announce|https://tracker.nekobt.to/api/tracker/public/announce|udp://open.stealth.si:80/announce|udp://tracker.opentrackr.org:1337/announce|udp://exodus.desync.com:6969/announce|udp://tracker.torrent.eu.org:451/announce

torrent_desc=DESCRIPTION.md
mini.*.torrent_desc=DESCRIPTION-mini.md

torrent_dir=torrents
torrent_title=${title} [$mux.crc]
torrent_out=${torrent_dir}/${torrent_title}.torrent

TV*.torrent_title=${title}
TV*.torrent_out=${torrent_dir}/${title}.torrent

discord_url=https://discord.com/servers/stalleido-subs-443264565069742080


# Episode numbers following TVDB
# Moved to the bottom because it's very spammy
tvdb=S${season}E${epnum}
{NC*}.tvdb=${episode}

batch_season=01
season=${batch_season}
epnum=${episode}


# S00 episodes
{SP*}.season=00
SP1.epnum=01
SP2.epnum=02


# S00 absolute-ish episode number, used for easier user readability in the filename
SP1.epabs=00
SP2.epabs=25
